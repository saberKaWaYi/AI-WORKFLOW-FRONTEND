services:
  web:
    build:
      context: .
    command: node src/server.js
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - APP_PORT=3000
      - MYSQL_URL=${MYSQL_URL:?Set MYSQL_URL to the external MySQL URL}
      - REDIS_URL=${REDIS_URL:?Set REDIS_URL to the external Redis URL}
      - SESSION_SECRET=${SESSION_SECRET:?Set SESSION_SECRET to a long random value}
      - SESSION_TTL_SECONDS=${SESSION_TTL_SECONDS:-604800}
      - GUEST_SESSION_TTL_SECONDS=${GUEST_SESSION_TTL_SECONDS:-86400}
      - NETWORK_API_URL=${NETWORK_API_URL:-http://host.docker.internal:8000/api/network/genshin}
      - STARTUP_PROBE_TIMEOUT_MS=${STARTUP_PROBE_TIMEOUT_MS:-5000}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
