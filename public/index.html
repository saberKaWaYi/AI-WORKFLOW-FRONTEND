<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>人工智能工作链前端</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="auth-screen" data-auth-screen>
      <div class="auth-bg-text" data-auth-bg-text></div>
      <main class="auth-panel">
        <section class="login-card">
          <div class="auth-header">
            <span class="micro">AI WORKFLOW FRONTEND</span>
          </div>
          <div class="tabs" role="tablist">
            <button class="tab is-active" type="button" data-auth-tab="login">登录</button>
            <button class="tab" type="button" data-auth-tab="register">注册</button>
          </div>
          <form class="auth-form" data-auth-form="login">
            <label>账号或邮箱<input name="login" autocomplete="username" required /></label>
            <label>密码<input name="password" type="password" autocomplete="current-password" required /></label>
            <div class="field">
              <label>进入系统</label>
              <select id="entrySystem" data-entry-system>
                <option value="raw">原始数据</option>
                <option value="text">文本工作链</option>
                <option value="video">视频工作链</option>
              </select>
            </div>
            <button class="primary-btn" type="submit">登录</button>
          </form>
          <form class="auth-form is-hidden" data-auth-form="register">
            <label>用户名<input name="username" autocomplete="username" required /></label>
            <label>邮箱<input name="email" type="email" autocomplete="email" /></label>
            <label>显示名称<input name="displayName" autocomplete="nickname" /></label>
            <label>密码<input name="password" type="password" autocomplete="new-password" required /></label>
            <div class="field">
              <label>进入系统</label>
              <select id="entrySystemReg" data-entry-system-reg>
                <option value="raw">原始数据</option>
                <option value="text">文本工作链</option>
                <option value="video">视频工作链</option>
              </select>
            </div>
            <button class="primary-btn" type="submit">注册并进入</button>
          </form>
          <button class="ghost-btn" type="button" data-guest>游客进入原始数据</button>
          <p class="form-message" data-auth-message></p>
        </section>
      </main>
    </div>

    <div class="app-shell is-hidden" data-app-shell>
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="brand hide-when-collapsed">
            <strong data-i18n="brandTitle">AI Workflow</strong>
            <span data-i18n="brandSubtitle" class="micro">智能工作链平台</span>
          </div>
          <button class="icon-btn" type="button" data-sidebar-toggle title="收放侧边栏">☰</button>
        </div>

        <div class="panel-section hide-when-collapsed">
          <div class="field">
            <label for="globalLang">语言 / Language</label>
            <select id="globalLang" data-global-lang>
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </div>
        </div>

        <div class="panel-section hide-when-collapsed" data-theme-section>
          <button class="theme-btn" type="button" data-theme-toggle>
            <span data-theme-icon>☀</span>
            <span data-theme-label data-i18n="themeLight">白天</span>
          </button>
        </div>

        <div class="panel-section hide-when-collapsed" data-dataset-section>
          <h2 data-i18n="dataSection">数据源</h2>
          <div class="field">
            <label for="dataset" data-i18n="datasetLabel">数据集</label>
            <select id="dataset" data-dataset></select>
          </div>
        </div>

        <div class="panel-section hide-when-collapsed" data-filter-section>
          <h2 data-i18n="filterSection">筛选器</h2>

          <div class="field" data-view-mode="cards">
            <label for="search" data-i18n="searchLabel">搜索</label>
            <input id="search" data-search type="text" placeholder="中文、英文或 ID" />
          </div>

          <div class="filter-group is-hidden" data-view-mode="graph">
            <div class="filter-group-title" data-i18n="focusGroupTitle">辐射筛选</div>
            <div class="field">
              <label for="focusNode" data-i18n="focusNodeLabel">中心节点</label>
              <select id="focusNode" data-focus-node></select>
            </div>
            <div class="field">
              <label for="focusDepth" data-i18n="focusDepthLabel">辐射层数</label>
              <select id="focusDepth" data-focus-depth>
                <option value="1">1 层</option>
                <option value="2">2 层</option>
                <option value="3">3 层</option>
                <option value="4">4 层</option>
                <option value="5">5 层</option>
              </select>
            </div>
          </div>

          <div class="filter-group is-hidden" data-view-mode="graph">
            <div class="filter-group-title" data-i18n="pathGroupTitle">路径查找</div>
            <div class="field">
              <label for="pathSource" data-i18n="pathSourceLabel">起点</label>
              <select id="pathSource" data-path-source></select>
            </div>
            <div class="field">
              <label for="pathTarget" data-i18n="pathTargetLabel">终点</label>
              <select id="pathTarget" data-path-target></select>
            </div>
          </div>

          <div class="field is-hidden" data-view-mode="graph">
            <label for="sizeMode" data-i18n="sizeModeLabel">节点大小</label>
            <select id="sizeMode" data-size-mode>
              <option value="degree" data-i18n="sizeDegree">按连接数</option>
              <option value="uniform" data-i18n="sizeUniform">统一大小</option>
            </select>
          </div>

          <div class="field is-hidden" data-view-mode="graph">
            <label for="layout" data-i18n="layoutLabel">布局方式</label>
            <select id="layout" data-layout>
              <option value="radial" data-i18n="layoutRadial">辐射布局</option>
              <option value="force" data-i18n="layoutForce">力导向</option>
              <option value="circle" data-i18n="layoutCircle">环形布局</option>
              <option value="columns" data-i18n="layoutColumns">分列布局</option>
            </select>
          </div>

          <div class="field is-hidden" data-view-mode="graph">
            <label for="lang" data-i18n="languageLabel">节点语言</label>
            <select id="lang" data-lang>
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </div>
        </div>

        <div class="panel-section hide-when-collapsed" data-view-toggle-section>
          <button class="theme-btn" type="button" data-view-toggle>
            <span data-view-icon>📊</span>
            <span data-view-label data-i18n="switchToGraph">切换到关系图</span>
          </button>
        </div>

        <div class="panel-section hide-when-collapsed">
          <button class="theme-btn" type="button" data-logout data-i18n="logoutLabel">退出登录</button>
        </div>
      </aside>

      <main class="main">
        <header class="page-header">
          <div class="page-title">
            <h1 data-page-title>原始数据</h1>
            <p data-status>加载中...</p>
          </div>
          <div class="stats" data-stats-section>
            <div class="stat"><b data-total>0</b><span data-i18n="statTotal">节点</span></div>
            <div class="stat"><b data-visible>0</b><span data-i18n="statVisible">显示</span></div>
            <div class="stat"><b data-edges>0</b><span data-i18n="statEdges">关系</span></div>
          </div>
        </header>

        <section id="characterGrid" class="grid" data-view="cards"></section>

        <section class="graph-wrap is-hidden" data-view="graph">
          <canvas id="graphCanvas"></canvas>
        </section>

        <div class="floating-related-panel" data-floating-panel>
          <h4 data-floating-title>相关角色</h4>
          <div data-floating-content></div>
        </div>

        <section class="workflow-section is-hidden" data-view="text">
          <div class="workflow-header">
            <button class="primary-btn" type="button" data-start-text-workflow>启动 AI 文本工作流</button>
          </div>
          <div class="workflow-table">
            <table>
              <thead>
                <tr>
                  <th>_id</th>
                  <th>详情</th>
                </tr>
              </thead>
              <tbody data-text-tasks>
              </tbody>
            </table>
          </div>
        </section>

        <section class="workflow-section is-hidden" data-view="video">
          <div class="workflow-header">
            <div class="workflow-controls">
              <input type="text" placeholder="请输入 _id" data-video-id-input />
              <button class="primary-btn" type="button" data-start-video-workflow>启动 AI 视频工作流</button>
              <button class="ghost-btn" type="button" data-download-video>下载视频</button>
            </div>
          </div>
          <div class="workflow-table">
            <table>
              <thead>
                <tr>
                  <th>_id</th>
                  <th>详情</th>
                </tr>
              </thead>
              <tbody data-video-tasks>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <script src="./app.js"></script>
  </body>
</html>
